<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>中国铁路百年发展史 - 故事地图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC',sans-serif;background:#f5f0e8;color:#3a3028;overflow:hidden}
header{position:fixed;top:0;left:0;right:0;height:70px;background:linear-gradient(135deg,#fffdf8,#f5efe0);border-bottom:2px solid #C9A96E;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;box-shadow:0 2px 15px rgba(0,0,0,.08)}
header h1{font-size:1.9rem;font-weight:900;background:linear-gradient(135deg,#B8860B,#C9A96E,#D4A84B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:flex;align-items:center;gap:.75rem;letter-spacing:1px}
header .subtitle{font-size:.95rem;color:#8a7560;letter-spacing:.5px}
main{position:fixed;top:70px;left:0;right:0;bottom:0;display:flex}
#map-container{flex:1;position:relative;background:#000;border-right:1.5px solid rgba(201,169,110,.12);overflow:hidden}
#map{width:100%;height:100%}
#story-panel{position:relative;width:380px;background:linear-gradient(180deg,#fffdf8,#f5f0e8);border-left:2px solid rgba(201,169,110,.25);display:flex;flex-direction:column;overflow:hidden;box-shadow:-6px 0 25px rgba(0,0,0,.08);transition:width .4s ease}
#story-panel.collapsed{width:36px;min-width:36px;border-left:1.5px solid rgba(201,169,110,.4)}
#story-panel.collapsed .story-header,#story-panel.collapsed .story-content,#story-panel.collapsed .story-footer{display:none}
.story-header{padding:1.75rem;border-bottom:1.5px solid rgba(201,169,110,.25);background:rgba(201,169,110,.08)}
.story-header h2{font-size:1.8rem;font-weight:950;background:linear-gradient(135deg,#B8860B,#C9A96E,#D4A84B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.8rem;letter-spacing:1.5px;text-shadow:0 0 20px rgba(201,169,110,.15)}
.chapter-time{font-size:.95rem;color:#8a7560;display:flex;align-items:center;gap:.6rem;font-weight:600;letter-spacing:.5px}
.story-content{flex:1;overflow-y:auto;padding:1.75rem;scroll-behavior:smooth;color:#3a3028}
.story-content::-webkit-scrollbar{width:2px}
.story-content::-webkit-scrollbar-thumb{background:rgba(201,169,110,.25);border-radius:1px}
.story-image{width:100%;height:160px;border-radius:.75rem;overflow:hidden;margin-bottom:1.2rem;border:2px solid rgba(201,169,110,.25);box-shadow:0 4px 15px rgba(0,0,0,.4);background-size:cover;background-position:center}
.story-image img{width:100%;height:100%;object-fit:cover;display:block}
.story-text{line-height:2;color:#2e2418;font-size:1.12rem;margin-bottom:1.8rem;letter-spacing:.5px;font-family:'Georgia','PingFang SC',serif}
.story-text p{margin-bottom:1.4rem;text-align:justify;font-size:1.12rem;color:#2e2418;font-weight:500}
.story-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1.8rem}
.stat-item{background:linear-gradient(135deg,rgba(201,169,110,.15),rgba(180,140,80,.08));border:1.5px solid rgba(201,169,110,.35);border-radius:.85rem;padding:1.2rem .8rem;text-align:center;transition:all .3s}
.stat-item:hover{border-color:#C9A96E;box-shadow:0 0 20px rgba(201,169,110,.4);transform:translateY(-2px)}
.stat-value{font-size:2rem;font-weight:950;background:linear-gradient(135deg,#B8860B,#C9A96E);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.8rem;letter-spacing:1.5px}
.stat-label{font-size:.85rem;color:#8a7560;text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.story-actions{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1.8rem}
.action-btn{padding:.9rem 1.3rem;background:rgba(201,169,110,.12);border:1.5px solid rgba(201,169,110,.3);color:#5a4a30;border-radius:.7rem;cursor:pointer;transition:all .3s;font-size:1rem;display:flex;align-items:center;justify-content:center;gap:.6rem;font-weight:800;letter-spacing:.8px}
.action-btn:hover:not(:disabled){border-color:#B8860B;background:rgba(201,169,110,.22);color:#3a2a18;transform:translateY(-2px);box-shadow:0 5px 15px rgba(201,169,110,.3)}
.action-btn.primary{background:#B8860B;border-color:#C9A96E;color:#fff}
.action-btn.primary:hover:not(:disabled){background:#C9A96E;border-color:#D4A84B;box-shadow:0 8px 20px rgba(201,169,110,.5)}
.action-btn:disabled{opacity:.4;cursor:not-allowed}
.story-footer{padding:1.5rem;border-top:1.5px solid rgba(201,169,110,.2);background:rgba(201,169,110,.05)}
.source{font-size:.8rem;color:#8a7560;display:flex;align-items:center;gap:.6rem;font-weight:600;letter-spacing:.4px}
#map-controls{position:absolute;top:1.5rem;right:1.5rem;z-index:1000;display:flex;flex-direction:column;gap:.75rem;pointer-events:auto}
.control-btn{width:55px;height:55px;background:linear-gradient(135deg,rgba(255,255,255,.95),rgba(245,240,232,.92));backdrop-filter:blur(20px);border:1.5px solid rgba(201,169,110,.35);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;font-size:1.4rem;color:#5a4a30;box-shadow:0 4px 15px rgba(0,0,0,.1)}
.control-btn:hover{border-color:#D4A84B;transform:scale(1.15);box-shadow:0 0 30px rgba(201,169,110,.5)}
.control-btn.active{background:linear-gradient(135deg,#B8860B,#C9A96E);border-color:#D4A84B;color:#fff;box-shadow:0 0 30px rgba(201,169,110,.5)}
#layer-panel{position:absolute;top:1.5rem;right:70px;background:linear-gradient(135deg,rgba(255,255,255,.98),rgba(245,240,232,.95));backdrop-filter:blur(20px);border:1.5px solid rgba(201,169,110,.3);border-radius:1.2rem;padding:1.75rem;width:250px;box-shadow:0 10px 40px rgba(0,0,0,.12);z-index:999;transition:all .3s;max-height:70vh;overflow-y:auto}
#layer-panel.hidden{opacity:0;pointer-events:none;transform:translateX(10px)}
.layer-title{font-size:1.05rem;font-weight:800;color:#B8860B;margin-bottom:1.2rem;display:flex;align-items:center;gap:.6rem;border-bottom:1.5px solid rgba(201,169,110,.3);padding-bottom:1rem}
.layer-item{display:flex;align-items:center;justify-content:space-between;padding:.85rem;margin-bottom:.7rem;background:rgba(201,169,110,.05);border-radius:.7rem;cursor:pointer;border:1px solid rgba(201,169,110,.2)}
.layer-item:hover{background:rgba(201,169,110,.1);border-color:rgba(201,169,110,.4)}
.toggle-switch{width:44px;height:24px;background:rgba(180,150,120,.2);border-radius:12px;position:relative;transition:background .3s}
.toggle-switch.active{background:#B8860B}
.toggle-slider{width:20px;height:20px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .3s}
.toggle-switch.active .toggle-slider{transform:translateX(20px)}
#timeline-wrapper{position:absolute;bottom:1rem;left:1rem;right:1rem;z-index:999;display:flex;flex-direction:column;gap:10px}
#timeline-progress{width:100%;height:5px;background:rgba(180,160,140,.2);border-radius:3px;overflow:hidden}
#timeline-progress-bar{height:100%;background:linear-gradient(90deg,#8B6914,#D4A84B);border-radius:3px;transition:width .5s ease;box-shadow:0 0 12px rgba(201,169,110,.5)}
#timeline{position:relative;height:90px;background:linear-gradient(180deg,#fffdf8,#f5f0e8);backdrop-filter:blur(20px);border:1.5px solid rgba(201,169,110,.25);border-radius:18px;display:flex;align-items:center;justify-content:space-evenly;overflow-x:auto;padding:0 1.5rem;scroll-behavior:smooth;pointer-events:auto;box-shadow:0 4px 20px rgba(0,0,0,.08)}
#timeline::-webkit-scrollbar{height:2px}
#timeline::-webkit-scrollbar-thumb{background:rgba(201,169,110,.4);border-radius:1px}
#timeline::before{content:'';position:absolute;top:26px;left:8%;right:8%;height:2px;background:linear-gradient(90deg,transparent,rgba(201,169,110,.3),transparent);pointer-events:none;z-index:1}
.timeline-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:all .35s;position:relative;flex:1;min-width:55px;max-width:160px}
.timeline-dot-circle{width:18px;height:18px;border-radius:50%;background:rgba(201,169,110,.12);border:2px solid rgba(201,169,110,.3);transition:all .35s;position:relative;z-index:2}
.timeline-dot-circle::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;background:transparent;transition:all .35s}
.timeline-item:hover .timeline-dot-circle{background:rgba(201,169,110,.4);border-color:#C9A96E;box-shadow:0 0 12px rgba(201,169,110,.5);transform:scale(1.2)}
.timeline-item.active .timeline-dot-circle{background:#C9A96E;border-color:#B8860B;box-shadow:0 0 25px rgba(201,169,110,.6);transform:scale(1.3)}
.timeline-item.active .timeline-dot-circle::after{background:#fff}
.timeline-label{font-size:.82rem;color:rgba(140,120,90,.4);font-weight:700;letter-spacing:1px;transition:all .35s;white-space:nowrap;text-align:center;text-transform:uppercase}
.timeline-item:hover .timeline-label{color:rgba(100,80,50,.85)}
.timeline-item.active .timeline-label{color:#B8860B;font-weight:900;font-size:.95rem;text-shadow:0 0 8px rgba(201,169,110,.4)}
.timeline-year{font-size:.72rem;color:rgba(140,120,90,.35);font-weight:600;letter-spacing:2px;transition:all .35s;white-space:nowrap;font-family:'Georgia','Courier New',monospace}
.timeline-item:hover .timeline-year{color:rgba(100,80,50,.6)}
.timeline-item.active .timeline-year{color:#B8860B;font-weight:800;font-size:.78rem;text-shadow:0 0 6px rgba(201,169,110,.3)}
@keyframes pulse{0%,100%{opacity:.6;transform:translateY(0)}50%{opacity:1;transform:translateY(4px)}}
@keyframes highlight-pulse{0%,100%{stroke-width:5;opacity:1}50%{stroke-width:8;opacity:.7}}
.highlighted-railway{animation:highlight-pulse 1.5s infinite!important}
.train-icon{width:60px;height:60px;text-align:center;line-height:60px;font-size:42px;filter:drop-shadow(0 0 16px rgba(201,169,110,.8)) drop-shadow(0 0 30px rgba(240,215,140,.5));transform:translate(-50%,-50%)}
.compare-mode #map-container{overflow:hidden}
.compare-mode #map{width:50%;float:left;border-right:3px solid #C9A96E}
#map-right{display:none;width:50%;height:100%;float:right;position:absolute;top:0;right:0;z-index:99}
.compare-mode #map-right{display:block}
#compare-divider{display:none;position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:1005;background:rgba(0,0,0,.85);color:#F0D78C;padding:5px 14px;border-radius:15px;font-weight:900;font-size:.8rem;border:2px solid #C9A96E;pointer-events:none}
.compare-mode #compare-divider{display:block}
#compare-label-l,#compare-label-r{display:none;position:absolute;top:10px;z-index:1005;background:rgba(0,0,0,.8);color:#F0D78C;padding:4px 12px;border-radius:10px;font-weight:800;font-size:.75rem;pointer-events:none}
.compare-mode #compare-label-l{display:block;left:10px}
.compare-mode #compare-label-r{display:block;right:10px}
@media(max-width:768px){header h1{font-size:1.2rem}header .subtitle{display:none}#story-panel{width:280px}#map-controls{flex-direction:row;bottom:70px;right:1.5rem;top:auto}}

/* ========== 全新精致开场动画 ========== */
#intro-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 30% 20%, #0a0806, #1a1510);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    transition: opacity 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    font-family: 'Georgia', 'Noto Serif SC', 'STSong', serif;
    overflow: hidden;
}
#intro-overlay.hidden {
    opacity: 0;
    pointer-events: none;
}
/* 动态铁轨背景 */
.rail-bg {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 120px;
    background: repeating-linear-gradient(90deg, 
        rgba(201,169,110,0.2) 0px, 
        rgba(201,169,110,0.2) 4px,
        transparent 4px,
        transparent 40px);
    background-size: 40px 100%;
    pointer-events: none;
    z-index: 1;
}
.rail-bg::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, rgba(201,169,110,0.5), #C9A96E, rgba(201,169,110,0.5));
    box-shadow: 0 20px 0 rgba(201,169,110,0.3);
}
.rail-bg::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, rgba(201,169,110,0.5), #C9A96E, rgba(201,169,110,0.5));
}
/* 移动的蒸汽火车头 */
.train-moving {
    position: absolute;
    bottom: 30px;
    left: -15%;
    font-size: 70px;
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.6)) drop-shadow(0 0 15px rgba(201,169,110,0.8));
    z-index: 3;
    animation: trainDrive 4s ease-in-out forwards;
    pointer-events: none;
}
@keyframes trainDrive {
    0% { left: -20%; transform: scaleX(1);}
    60% { left: 65%; transform: scaleX(1);}
    100% { left: 120%; transform: scaleX(1);}
}
/* 光晕粒子 */
.particle-field {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 2;
}
.particle {
    position: absolute;
    background: rgba(255,215,140,0.6);
    border-radius: 50%;
    box-shadow: 0 0 10px #FFD700;
    animation: floatParticle 3s infinite alternate;
}
@keyframes floatParticle {
    0% { transform: translateY(0px) scale(1); opacity: 0.2;}
    100% { transform: translateY(-40px) scale(1.2); opacity: 0.8;}
}
/* 主标题区域 */
.intro-main-title {
    text-align: center;
    z-index: 10;
    margin-bottom: 2rem;
}
#intro-title {
    font-size: 2.3rem;
    font-weight: 900;
    background: linear-gradient(135deg, #E8C572, #C9A96E, #F5D98F);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 30px rgba(201,169,110,0.5);
    letter-spacing: 4px;
    margin-bottom: 1rem;
    opacity: 0;
    transform: translateY(20px);
    animation: titleGlow 0.8s forwards 0.3s;
    white-space: nowrap;
}
@keyframes titleGlow {
    to { opacity: 1; transform: translateY(0); text-shadow: 0 0 20px rgba(201,169,110,0.8);}
}
.sub-quote {
    font-size: 0.9rem;
    color: rgba(230,200,150,0.8);
    letter-spacing: 2px;
    font-weight: 400;
    border-top: 1px solid rgba(201,169,110,0.5);
    display: inline-block;
    padding-top: 0.6rem;
    margin-top: 0.5rem;
    opacity: 0;
    animation: fadeUp 1s forwards 0.6s;
}
@keyframes fadeUp {
    to { opacity: 1; transform: translateY(0);}
    from { opacity: 0; transform: translateY(15px);}
}
/* 铁轨延伸动画容器 */
#intro-rail-container {
    position: relative;
    width: 70%;
    max-width: 550px;
    height: 6px;
    background: rgba(60,45,30,0.5);
    border-radius: 3px;
    overflow: visible;
    margin: 2.5rem 0;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
#intro-rail-line {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #FFD966, #C9A96E, #E8B85A);
    border-radius: 3px;
    transition: width 1.6s cubic-bezier(0.34, 1.2, 0.64, 1);
    box-shadow: 0 0 18px rgba(201,169,110,0.8);
}
.rail-spark {
    position: absolute;
    top: -4px;
    right: 0;
    width: 8px;
    height: 14px;
    background: radial-gradient(circle, #FFE484, #FFA500);
    border-radius: 50%;
    filter: blur(2px);
    opacity: 0;
    transition: opacity 0.3s;
}
/* 里程数据闪出 */
.mile-stone {
    display: flex;
    gap: 2rem;
    justify-content: center;
    margin-top: 1.2rem;
    z-index: 10;
    opacity: 0;
    animation: fadeUp 0.8s forwards 1.2s;
}
.mile-item {
    text-align: center;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);
    padding: 0.5rem 1.2rem;
    border-radius: 40px;
    border: 1px solid rgba(201,169,110,0.5);
}
.mile-number {
    font-size: 1.4rem;
    font-weight: 900;
    color: #FFD966;
    font-family: monospace;
}
.mile-label {
    font-size: 0.7rem;
    color: #C9A96E;
    letter-spacing: 1px;
}
/* 打字机字幕 */
#intro-subtitle {
    font-size: 1.2rem;
    color: #E8C572;
    letter-spacing: 1px;
    font-weight: 500;
    margin-top: 1.8rem;
    text-align: center;
    min-height: 3rem;
    opacity: 0;
    transition: opacity 0.6s;
    z-index: 10;
    text-shadow: 0 0 8px rgba(0,0,0,0.5);
}
#intro-subtitle.show {
    opacity: 1;
}
.intro-char {
    display: inline-block;
    opacity: 0;
    transform: translateY(6px);
    animation: charReveal 0.08s forwards;
    font-weight: 600;
}
@keyframes charReveal {
    to { opacity: 1; transform: translateY(0);}
}
/* 底部年份装饰 */
.era-stamp {
    position: absolute;
    bottom: 20px;
    right: 30px;
    font-size: 0.75rem;
    color: rgba(201,169,110,0.4);
    font-family: monospace;
    z-index: 10;
    letter-spacing: 2px;
}
</style>
</head>
<body>
<!-- 全新开场动画层 -->
<div id="intro-overlay">
    <div class="rail-bg"></div>
    <div class="train-moving">🚂💨</div>
    <div class="particle-field" id="particleField"></div>
    <div class="intro-main-title">
        <div id="intro-title">🚞 中国铁路百年扩张史 🚄</div>
        <div class="sub-quote">1876 · 吴淞铁路 | 2024 · 百年征程·日行千里</div>
    </div>
    <div id="intro-rail-container">
        <div id="intro-rail-line"></div>
        <div class="rail-spark" id="railSpark"></div>
    </div>
    <div class="mile-stone">
        <div class="mile-item"><div class="mile-number">14.5 km</div><div class="mile-label">第一条铁路</div></div>
        <div class="mile-item"><div class="mile-number">15.9 万 km</div><div class="mile-label">总里程</div></div>
        <div class="mile-item"><div class="mile-number">4.5 万 km</div><div class="mile-label">高铁里程</div></div>
    </div>
    <div id="intro-subtitle"></div>
    <div class="era-stamp">1876 → 2024 · 百年跨越</div>
</div>

<header><h1><i class="fas fa-train"></i> 中国铁路百年发展史</h1><div class="subtitle">1876 - 2024 · 从屈辱到崛起的148年</div></header>
<main>
<div id="map-container"><div id="map"></div><div id="map-right"></div><div id="compare-divider">🔍 时光对比</div><div id="compare-label-l"></div><div id="compare-label-r"></div>
<div id="map-controls"><div class="control-btn" id="resetBtn" title="重置视角">🎯</div><div class="control-btn" id="layerToggleBtn" title="图层控制">📋</div><div class="control-btn" id="compareBtn" title="时光双向对比">↔️</div><div class="control-btn" id="mapLayerBtn" title="切换地图底图">🏛️</div><div class="control-btn" id="autoPlayBtn" title="自动播放">▶️</div></div>
<div id="layer-panel" class="hidden"><div class="layer-title"><i class="fas fa-layer-group"></i> 铁路线路</div><div id="layer-list"></div></div>
<div id="timeline-wrapper"><div id="timeline-progress"><div id="timeline-progress-bar" style="width:0%"></div></div><div id="timeline"></div></div>
</div>
<div id="story-panel"><div id="sidebar-collapse-btn" style="position:absolute;left:-18px;top:50%;transform:translateY(-50%);width:36px;height:36px;background:linear-gradient(135deg,#0088CC,#00CCFF);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:101;font-size:1.2rem;color:#fff;box-shadow:0 4px 15px rgba(0,200,255,.4);border:2px solid #fff" title="收起/展开侧边栏">◀</div>

const chapters=[{id:'intro',title:'🚂 铁路之梦的开端',subtitle:'1876年 · 上海吴淞',year:'1876',description:'你能想象吗？中国第一条铁路——吴淞铁路，通车仅1年就被清政府花巨款买回，全部拆毁扔入海中。14.5公里的铁轨，蒸汽机车的轰鸣，为何让一个古老帝国如此恐惧？',camera:{center:[31.38,121.49],zoom:13},stats:[{v:'14.5',l:'公里'},{v:'1条',l:'初始铁路'},{v:'拆毁',l:'命运'}],hlLine:null,hlCity:'上海',soloLines:['wuSong']},{id:'beginning-1',title:'📍 第一条铁路的诞生',subtitle:'1876年 · 上海吴淞',year:'1876',description:'蒸汽机车轰隆隆驶过田野——农民惊恐，朝廷反对。28.5万两白银买回的，不是铁路，是恐惧。这条被拆毁的铁轨，本该开启中国工业化，却成了闭关锁国的注脚。但也许，正是这次拆毁，埋下了百年后逆袭的种子。',camera:{center:[31.38,121.49],zoom:12},stats:[{v:'14.5',l:'公里'},{v:'1年',l:'运营期'},{v:'拆毁',l:'结局'}],hlLine:null,hlCity:'上海',soloLines:['wuSong']},{id:'beginning-2',title:'🏔️ 詹天佑的奇迹',subtitle:'1909年 · 京张铁路',year:'1909',description:'外国人嘲笑："中国能修京张铁路的工程师还没出生。"33年后，詹天佑用"人"字形设计征服八达岭。201公里，翻越崇山峻岭——不是用蛮力，而是用智慧。一个没有留洋背景的中国工程师，凭什么让世界闭嘴？',camera:{center:[40.452,115.8],zoom:9},stats:[{v:'201',l:'公里'},{v:'"人"字形',l:'创新'},{v:'世界级',l:'水准'}],hlLine:'京张铁路',hlCity:'北京',soloLines:['wuSong','京张铁路']},{id:'development-1',title:'🏗️ 新中国的第一路',subtitle:'1952年 · 成渝铁路',year:'1952',description:'没有大型机械，没有专业设备——30万军民，用双手、铁锹和肩膀，在崇山峻岭间凿出505公里。仅用2年！对比76年前那条被拆毁的14.5公里吴淞铁路，新中国用30万人的汗水，宣告了一个时代的分水岭。',camera:{center:[30.05,104.55],zoom:7.5},stats:[{v:'505',l:'公里'},{v:'30万',l:'参建者'},{v:'2年',l:'完工期'}],hlLine:'成渝铁路',hlCity:'成都',soloLines:['wuSong','京张铁路','成渝铁路']},{id:'development-3',title:'🌌 通往世界屋脊',subtitle:'2006年 · 青藏铁路',year:'2006',description:'4500米海拔、-40°C严寒、550公里冻土——外国专家断言："不可能。"但中国做到了。供氧列车穿越唐古拉山口，藏族阿妈第一次看见火车驶过家门口。天路不是神话，是中国人用半个世纪的论证换来的。这条铁路，改变了高原的命运。',camera:{center:[31.5,91.0],zoom:6},stats:[{v:'4500米',l:'平均海拔'},{v:'550公里',l:'冻土区'},{v:'世界之最',l:'成就'}],hlLine:'青藏铁路',hlCity:'拉萨',soloLines:['wuSong','京张铁路','成渝铁路','青藏铁路']},{id:'climax-1',title:'🕸️ 八纵八横',subtitle:'2020年 · 高铁网络成型',year:'2020',description:'3.8万公里高铁，占全球2/3。16条国家级大通道——八纵八横——如血管般铺满神州大地。从北京到上海只需4小时，古人的"千里江陵一日还"成了日常。此时回看1876年被拆毁的吴淞铁路，恍如隔世。这不仅仅是一张网——这是中国速度的骨架。',camera:{center:[34.26,110.19],zoom:5},stats:[{v:'3.8万',l:'公里高铁'},{v:'2/3',l:'全球占比'},{v:'16条',l:'国家级大通道'}],hlLine:null,hlCity:null,soloLines:['wuSong','京沪高铁','京广高铁','京哈铁路','沿海通道','京港通道','呼南通道','京昆通道','包海通道','兰广通道','沪昆高铁','陆桥通道','沿江通道','广昆通道','厦渝通道','青银通道','京兰通道','绥满通道','京张铁路','青藏铁路','成渝铁路','陇海线']},{id:'ending-1',title:'🌏 走出国门',subtitle:'2021年 · 中老铁路',year:'2021',description:'2021年12月3日，中老铁路通车。从昆明到万象，1035公里。老挝首条现代化铁路，167座隧道+301座桥梁，"陆锁国"变"陆联国"。中国铁路标准首次完整输出。',camera:{center:[20,102.5],zoom:7},stats:[{v:'1035',l:'公里'},{v:'167座',l:'隧道数'},{v:'陆联国',l:'成就'}],hlLine:'中老铁路',hlCity:'昆明',soloLines:['中老铁路']},{id:'ending-2',title:'🌐 钢铁丝绸之路',subtitle:'2024年 · 中欧班列',year:'2024',description:'截至2024年，中欧班列开行超8万列，连接中国200+城市与欧洲25国217城。经新疆出境，穿越哈萨克斯坦、俄罗斯、波兰抵达德国。古丝路，钢铁重生。',camera:{center:[52,60],zoom:3.5},stats:[{v:'8万+',l:'班列总数'},{v:'200+城',l:'中国城市'},{v:'217城',l:'欧洲城市'}],hlLine:'中欧班列·北线',hlCity:'西安',soloLines:['中欧班列·北线','中欧班列·南线','陇海线']},{id:'conclusion',title:'🎯 百年征程，日行千里',subtitle:'1876-2024',year:'2024',description:'时至2024年，15.9万里铁路织密华夏脉络，4.5万里高铁坐拥全球七成规模。八纵八横十六大通道铺展国土，二十一条高铁干线畅行全域，多条跨境铁路连通亚欧诸国，北抵草原、南达南洋、西通中亚远至鹿特丹。历经一百四十八载岁月浮沉，从满目疮痍走向世界顶尖，中国铁路书写下从追赶到领跑的旷世传奇。',camera:{center:[42.0,90.0],zoom:3.5},stats:[{v:'15.9万',l:'公里铁路'},{v:'4.5万',l:'公里高铁'},{v:'全球第一',l:'地位'}],hlLine:null,hlCity:null,soloLines:['京沪高铁','京广高铁','沪昆高铁','京哈铁路','哈大高铁','沿海通道','京港通道','呼南通道','京昆通道','包海通道','兰广通道','陆桥通道','沿江通道','广昆通道','厦渝通道','青银通道','京兰通道','绥满通道','青藏铁路','成渝铁路','京张铁路','兰新高铁','贵广高铁','西成高铁','南广高铁','合福高铁','济青高铁','成贵高铁','郑西高铁','兰渝铁路','徐兰高铁','沪宁城际','京津城际','大西高铁','成渝高铁','广深港高铁','昌赣深高铁','郑渝高铁','银西高铁','商合杭高铁','中老铁路','中泰铁路','中缅铁路','中越铁路','中蒙铁路','中巴铁路','中吉乌铁路','新亚欧大陆桥','俄罗斯远东线','中欧班列·北线','中欧班列·南线','陇海线','雅万高铁']}];

function updateRightMap(){if(!rightMap)return;rightMap.eachLayer(layer=>{if(layer!==rightTileLayer)rightMap.removeLayer(layer)});rightRailwayLayers={};rightCityMarkers={};rightLabels={};const endCh=chapters[chapters.length-1];rightMap.setView(endCh.camera.center,endCh.camera.zoom);railwayLines.forEach(r=>{const p=L.polyline(r.coordinates,{color:r.color,weight:4,opacity:.8,smoothFactor:2,lineCap:'round',lineJoin:'round'}).addTo(rightMap);p.bindPopup('<b>🚄 '+r.name+'</b><br>通车年份：'+r.year);rightRailwayLayers[r.name]=p});cities.forEach(c=>{const m=L.circleMarker(c.coords,{radius:7,fillColor:'#FFD700',color:'#fff',weight:2,fillOpacity:.9}).addTo(rightMap);m.bindPopup('<b>📍 '+c.name+'</b>');rightCityMarkers[c.name]=m});railwayStations.forEach(r=>{L.circleMarker(r.startCoords,{radius:8,fillColor:'#4CAF50',color:'#fff',weight:3,fillOpacity:.9}).addTo(rightMap).bindPopup('🚆 '+r.startName)});railwayStations.forEach(r=>{L.circleMarker(r.endCoords,{radius:8,fillColor:'#FF5252',color:'#fff',weight:3,fillOpacity:.9}).addTo(rightMap).bindPopup('🚆 '+r.endName)});beltAndRoadNodes.forEach(n=>{L.circleMarker(n.coords,{radius:8,fillColor:'#9C27B0',color:'#fff',weight:2,opacity:.7,fillOpacity:.7}).addTo(rightMap).bindPopup('🛤️ '+n.name)});fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json').then(r=>r.json()).then(data=>{L.geoJSON(data,{style:{color:'#1A237E',weight:2.5,opacity:.7,dashArray:'10,6',fillOpacity:.03,fillColor:'#1A237E'}}).addTo(rightMap)}).catch(()=>{});}

let trainMarker=null,trainTimers=[];function animateTrain(name){stopTrainAnimation();const r=railwayLines.find(r=>r.name===name);if(!r)return;const coords=r.coordinates;let step=0,total=coords.length-1;trainMarker=L.marker(coords[0],{icon:L.divIcon({className:'train-icon',html:'🚄',iconSize:[60,60],iconAnchor:[30,30]})}).addTo(map);const speed=180;function move(){if(step>=total){stopTrainAnimation();return}step++;const from=coords[step-1],to=coords[step];let t=0;const ss=25,si=speed/ss;const st=setInterval(()=>{t++;if(t>ss){clearInterval(st);return}if(!trainMarker){clearInterval(st);return}trainMarker.setLatLng([from[0]+(to[0]-from[0])*(t/ss),from[1]+(to[1]-from[1])*(t/ss)])},si);trainTimers.push(st,setTimeout(move,speed))}trainTimers.push(setTimeout(move,500))}function stopTrainAnimation(){trainTimers.forEach(t=>{clearTimeout(t);clearInterval(t)});trainTimers=[];if(trainMarker){map.removeLayer(trainMarker);trainMarker=null}}

  }, 900);
  setTimeout(function() {
    overlay.classList.add('hidden');
    // 开场动画结束后加载第一个章节（原本updateChapter(0)被延迟到这里执行）
    updateChapter(0);
  }, 3500);
  setTimeout(function() {
    if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
  }, 4500);
})();
// 注意：原脚本末尾的 updateChapter(0); 已移除，由动画结束后调用，避免覆盖。
</script>
</body>
</html>
